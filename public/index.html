<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/normalize.css">
    <link rel="stylesheet" href="./css/skeleton.css">
    <link rel="stylesheet" href="./css/tabulator_simple.css">
    <link rel="stylesheet" href="./css/nice-select2.css">
    <link rel="stylesheet" href="./css/styles.css">
    <title>JobNimbus</title>
</head>

<body>
    <h3>Welcome to the JobNimbus App</h3>
    <p>This returns all of the completed jobs between the starts and end date.</p>

    <div id="loading-spinner" style="display:none;">
        <p id="loading-text">Loading...</p>
        <div class="spinner"></div>

    </div>


    <div id="app-area">
        <div id="dates">
            <div class="date-input">
                <label for="start-date">Start Date:</label>
                <input type="date" id="start-date" value="2026-01-01">
            </div>
            <div class="date-input">
                <label for="end-date">End Date:</label>
                <input type="date" id="end-date" value="2026-03-19">
            </div>
        </div>


        <button id="fetch-btn">Get</button>

        <div id="table">

        </div>

    </div>


    <script src="./js/tabulator.min.js"></script>
    <script src="./js/nice-select2.js"></script>
    <script src="./js/app.js"></script>
</body>

</html>
